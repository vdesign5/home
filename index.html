<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WU DESIGN STUDIO — 伍設計事務所</title>
    <link rel="icon" type="image/png" href="./assets/favicon.ico.png">
    <link rel="apple-touch-icon" href="./assets/favicon.ico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.20/dist/lenis.css">
    <style>
        /* ── 字體 ──────────────────────────────────────────────
           請將字體檔案放入 assets/fonts/：
           GenSekiGothic-B.woff2  GenSekiGothic-R.woff2
           Apparat-Regular.woff2  Apparat-Medium.woff2
        ──────────────────────────────────────────────────────── */
        @font-face {
            font-family: 'GenSekiGothic';
            src: url('./assets/fonts/GenSekiGothic-B.woff2') format('woff2');
            font-weight: 700; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'GenSekiGothic';
            src: url('./assets/fonts/GenSekiGothic-R.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Apparat';
            src: url('./assets/fonts/Apparat-Regular.woff2') format('woff2');
            font-weight: 400; font-style: normal; font-display: swap;
        }
        @font-face {
            font-family: 'Apparat';
            src: url('./assets/fonts/Apparat-Medium.woff2') format('woff2');
            font-weight: 500; font-style: normal; font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'GenSekiGothic', 'Noto Sans TC', 'PingFang TC', sans-serif;
            color: #333; background: #fff;
            overflow-x: hidden; padding-bottom: 350px;
        }
        .en { font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif; }

        /* ══════════════════════════════════════════════════════
           HERO — Logo 展開互動
        ══════════════════════════════════════════════════════ */
        .hero {
            position: relative; z-index: 6;
            background: #fff;
            min-height: 100vh;
            display: flex; flex-direction: column;
            border-bottom: 1px solid #ebebeb;
        }

        .hero-topbar { display: none; }

        /* ── Logo Stage ─────────────────────────────────────── */
        .logo-stage {
            flex: 1;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden;
        }

        .logo-wrap {
            width: min(46vw, 580px);
            position: relative; z-index: 3; /* arch 在 showcase 之上 */
            flex-shrink: 0;
        }
        .logo-wrap svg {
            width: 100%; height: auto; display: block;
            overflow: visible;
        }

        /* ── SVG 文字圖層淡出（hover） ── */
        .logo-ch,
        .logo-en-text {
            transition: opacity 0.25s ease;
        }
        .logo-stage:hover .logo-ch,
        .logo-stage:hover .logo-en-text {
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        /* ── Arch 左右滑開 ── */
        .arch-left,
        .arch-right {
            transition: transform 0.95s cubic-bezier(0.76, 0, 0.24, 1);
        }
        .logo-stage:hover .arch-left  { transform: translateX(-42vw); }
        .logo-stage:hover .arch-right { transform: translateX(42vw);  }

        /* ── Showcase 置中疊層（在 arch SVG 之下） ── */
        .showcase {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 16px;
            opacity: 0; pointer-events: none;
            transition: opacity 0.45s ease 0s;
            z-index: 2; /* 低於 logo-wrap(3)，arch 在上方形成框架 */
        }
        .logo-stage:hover .showcase {
            opacity: 1; pointer-events: auto;
            transition: opacity 0.45s ease 0.45s;
        }

        .showcase-images {
            width: min(54vw, 660px);
            height: min(46vh, 420px);
            position: relative; overflow: hidden;
            flex-shrink: 0;
        }
        .showcase-img {
            position: absolute; inset: 0;
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0; transition: opacity 0.7s ease;
        }
        .showcase-img.active { opacity: 1; }

        /* 圖片上方：左中文分類、右英文分類（深色，固定高度防抖） */
        .showcase-overlay {
            width: min(54vw, 660px);
            height: 16px; overflow: hidden;
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 10px;
        }
        .sc-cat-zh {
            font-size: 11px; color: #666; letter-spacing: 0.04em; line-height: 1;
            white-space: nowrap;
        }
        .sc-cat-en {
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px; color: #999; letter-spacing: 0.12em;
            line-height: 1; text-align: right; text-transform: uppercase;
            white-space: nowrap;
        }

        /* 圖片下方：主標中文 + 副標英文 */
        .showcase-meta { text-align: center; min-height: 52px; }
        .sc-title-zh {
            font-size: 14px; color: #222; line-height: 1.55; font-weight: 500;
        }
        .sc-title-en {
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px; color: #aaa; line-height: 1.5; margin-top: 4px;
        }
        /* 無中文標題時，英文升格為主標 */
        .sc-title-en.is-primary {
            font-size: 14px; color: #222; font-weight: 500; margin-top: 0;
        }

        /* ── 輪播控制列（進度點 + 暫停鍵） ── */
        .showcase-controls { display: flex; align-items: center; gap: 10px; }
        .showcase-dots {
            display: flex; gap: 6px; align-items: center;
            background: rgba(0,0,0,0.05); padding: 7px 10px; border-radius: 20px;
        }
        .showcase-dot {
            width: 5px; height: 5px; border-radius: 3px;
            background: rgba(0,0,0,0.18); cursor: pointer; flex-shrink: 0;
            position: relative; overflow: hidden;
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1), background 0.3s;
        }
        .showcase-dot.active { width: 44px; background: rgba(0,0,0,0.08); }
        .dot-progress {
            position: absolute; left: 0; top: 0; height: 100%; width: 0%;
            background: rgba(0,0,0,0.5); border-radius: inherit; pointer-events: none;
        }
        .showcase-pause {
            width: 28px; height: 28px; border-radius: 50%;
            background: rgba(0,0,0,0.05); border: none; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s; padding: 0; flex-shrink: 0;
        }
        .showcase-pause:hover { background: rgba(0,0,0,0.1); }
        .showcase-pause svg { display: block; fill: rgba(0,0,0,0.45); }

        /* ── FILTER BAR ──────────────────────────────────────── */
        .filter-bar {
            position: relative; z-index: 6; background: #fff;
            display: flex; gap: 0;
            padding: 48px 60px 0; flex-wrap: wrap; align-items: center;
        }
        .filter-btn {
            background: none; border: none; outline: none;
            padding: 2px 6px; font-size: 13px;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            cursor: pointer; transition: color 0.2s; color: #c0c0c0;
        }
        .filter-btn:not(:last-of-type)::after { content: ' /'; color: #d8d8d8; pointer-events: none; }
        .filter-btn.active { color: #333; text-decoration: underline; text-underline-offset: 3px; }
        .filter-btn:hover:not(.active) { color: #444; }
        .filter-btn:active:not(.active) { color: #e0e0e0; }
        .filter-count {
            font-size: 11px; color: #bbb; padding-left: 8px;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
        }

        /* ── PROJECTS GRID ───────────────────────────────────── */
        .projects { padding: 36px 60px 80px; position: relative; background: #fff; z-index: 6; }
        .projects-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 40px; max-width: 1400px; margin: 0 auto; }

        .project-item {
            cursor: pointer; opacity: 0; transform: translateY(60px);
            transition: all 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
            display: block; text-decoration: none;
        }
        .project-item.in-view { opacity: 1; transform: translateY(0); }
        .project-item:hover { transform: translateY(-8px) scale(1.02); transition-delay: 0s !important; }

        .project-image { width: 100%; aspect-ratio: 1/1; overflow: hidden; border-radius: 8px; position: relative; }
        .project-image img, .project-image video {
            width: 100%; height: 100%; object-fit: cover;
            transition: transform 0.6s cubic-bezier(0.25,0.46,0.45,0.94);
            will-change: transform; display: block;
        }
        .project-item:hover .project-image img,
        .project-item:hover .project-image video { transform: scale(1.1) !important; }

        /* 圖片內浮層：左上中文分類、右上英文分類 */
        .project-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            padding: 13px 15px;
            display: flex; justify-content: space-between; align-items: flex-start;
            opacity: 0; transition: opacity 0.22s ease;
            pointer-events: none;
        }
        .project-item:hover .project-overlay { opacity: 1; }

        .project-cat-zh {
            font-size: 11px; color: #fff; letter-spacing: 0.04em;
            line-height: 1; text-shadow: 0 1px 5px rgba(0,0,0,0.35);
        }
        .project-cat-en {
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px; color: #fff; letter-spacing: 0.12em;
            line-height: 1; text-align: right; text-transform: uppercase;
            text-shadow: 0 1px 5px rgba(0,0,0,0.35);
        }

        /* 圖片下方：主標中文 + 副標英文 */
        .project-info { padding: 16px 0; }
        .project-title-zh {
            font-size: 15px; color: #111; line-height: 1.55; font-weight: 500;
        }
        .project-title-en {
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 12px; color: #aaa; line-height: 1.5; margin-top: 5px;
        }
        /* 無中文標題時英文升格為主標 */
        .project-title-en.is-primary {
            font-size: 15px; color: #111; margin-top: 0;
        }

        /* ── DYNAMIC ISLAND ──────────────────────────────────── */
        .dynamic-island {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: white; padding: 14px 48px;
            display: flex; align-items: center; justify-content: space-between;
            z-index: 10;
            border-top-left-radius: 32px; border-top-right-radius: 32px;
            box-shadow: 0 -6px 24px rgba(0,0,0,0.05);
            transform: translateY(100%); animation: slideUpIsland 0.8s ease 0.3s forwards;
        }
        @keyframes slideUpIsland { to { transform: translateY(0); } }

        .island-left { display: flex; gap: 24px; align-items: center; flex: 1; }

        .menu-toggle {
            display: flex; flex-direction: column; gap: 5px;
            cursor: pointer; padding: 6px; flex-shrink: 0;
        }
        .menu-toggle span {
            width: 24px; height: 2px; background: #ccc;
            border-radius: 2px; transition: all 0.3s;
        }
        .menu-toggle:hover span { background: #FF0000; }
        .menu-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(5px,5px); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(5px,-5px); }

        .menu-container {
            display: flex; gap: 24px; align-items: center;
            max-width: 0; overflow: hidden; opacity: 0;
            transition: max-width 0.4s cubic-bezier(0.25,0.46,0.45,0.94), opacity 0.3s;
        }
        .menu-container.open { max-width: 320px; opacity: 1; }

        .menu-item {
            cursor: pointer; flex-shrink: 0;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 13px; letter-spacing: 0.06em;
            color: #aaa; text-decoration: none; transition: color 0.25s;
        }
        .menu-item:hover { color: #FF0000; }
        .menu-item.active { color: #222; }

        .island-center {
            position: absolute; left: 50%; transform: translateX(-50%); z-index: 1;
        }
        .island-center a { display: block; transition: opacity 0.3s; }
        .island-center a:hover { opacity: 0.6; }
        .island-center img { height: 42px; display: block; pointer-events: none; }

        .island-right {
            flex: 1; text-align: right; position: relative; height: 40px;
        }
        .island-right .zh {
            display: block; font-size: 13px; color: #333;
            transition: opacity 0.25s cubic-bezier(0.4,0,0.2,1), transform 0.25s cubic-bezier(0.4,0,0.2,1);
            position: absolute; right: 0; top: 0; width: 100%;
        }
        .island-right .en {
            display: block; font-size: 11px; color: #888;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            transition: opacity 0.25s cubic-bezier(0.4,0,0.2,1), transform 0.25s cubic-bezier(0.4,0,0.2,1);
            position: absolute; right: 0; top: 20px; width: 100%;
        }
        .island-right .fade-out { opacity: 0; transform: translateY(-10px); }
        .island-right .fade-in  { opacity: 1; transform: translateY(0); }

        /* ── FOOTER ──────────────────────────────────────────── */
        footer {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #f2f2f2; color: #333; padding: 60px 80px 40px; z-index: 5;
        }
        .footer-content {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 80px;
        }
        .footer-left { display: flex; align-items: flex-start; }
        .footer-logo-img { height: 28px; filter: brightness(0) saturate(100%) invert(80%); flex-shrink: 0; }
        .footer-contact-info { display: flex; gap: 60px; }
        .footer-right { display: flex; justify-content: flex-end; }
        .footer-nav { display: flex; flex-direction: column; gap: 8px; }
        .footer-nav-item a {
            font-size: 14px; color: #666; text-decoration: none; transition: color 0.3s;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
        }
        .footer-nav-item a:hover { color: #333; }
        .footer-social { display: flex; flex-direction: column; gap: 8px; }
        .footer-social-item a {
            font-size: 14px; color: #666; text-decoration: none; transition: color 0.3s;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
        }
        .footer-social-item a:hover { color: #333; }
        .footer-bottom {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center;
            padding-top: 30px; border-top: 1px solid #ddd;
        }
        .back-to-top {
            font-size: 13px; color: #999; cursor: pointer; transition: color 0.3s;
            display: flex; align-items: center; gap: 5px;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
        }
        .back-to-top:hover { color: #333; }
        .footer-copyright {
            font-size: 11px; color: #999; letter-spacing: 0.5px;
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
        }
        .footer-contact-label {
            font-family: 'Apparat', 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px; color: #bbb; letter-spacing: 0.18em; text-transform: uppercase;
        }

        /* ── RESPONSIVE ───────────────────────────────────────── */
        @media (max-width: 968px) {
            body { padding-bottom: 360px; }

            .hero-topbar { padding: 20px 36px; }

            /* 手機版 hero：logo 縮成 Dynamic Island 寬，showcase 預設隱藏 */
            .logo-wrap { width: min(38vw, 160px); }
            .showcase {
                position: static;
                flex-direction: column;
                padding: 28px 36px 36px;
                gap: 16px;
                /* opacity/pointer-events 由 .is-top 控制，基礎值沿用 desktop（opacity:0） */
            }
            .showcase-overlay { width: 100%; padding-bottom: 4px; }
            /* 圖片尺寸純 viewport 計算，不依賴內容，避免抖動 */
            .showcase-images {
                width: calc(100vw - 72px);
                height: min(calc((100vw - 72px) * 0.625), 310px);
                flex-shrink: 0;
            }
            .showcase-meta { width: 100%; }
            .showcase-controls { justify-content: center; }

            .logo-stage {
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                overflow: visible;
                padding: 36px 0 0;
            }

            /* 手機：is-top 僅顯示 showcase，logo 保持完整可見 */
            .logo-stage.is-top .showcase {
                opacity: 1; pointer-events: auto;
                transition: opacity 0.45s ease;
            }

            .filter-bar { padding: 36px 24px 0; }
            .projects { padding: 28px 24px 60px; }
            .projects-grid { grid-template-columns: repeat(2,1fr); gap: 28px; }

            .dynamic-island { padding: 12px 20px; border-top-left-radius: 24px; border-top-right-radius: 24px; }
            .island-right { display: none; }
            /* 手機 logo 靠右，避免選單展開時遮擋 */
            .island-center { position: absolute; left: auto; right: 20px; transform: none; }
            .island-center img { height: 36px; }

            footer { padding: 40px 36px 32px; }
            .footer-content { flex-direction: column; gap: 24px; margin-bottom: 48px; }
            .footer-right { justify-content: flex-start; }
            .footer-contact-info { flex-direction: column; gap: 24px; }
            .footer-bottom { flex-direction: column; gap: 16px; align-items: flex-start; }
        }

        @media (max-width: 640px) {
            body { padding-bottom: 400px; }
            .hero-topbar { padding: 16px 20px; font-size: 10px; letter-spacing: 0.12em; }
            .logo-wrap { width: min(34vw, 130px); }
            .logo-stage { padding: 28px 0 0; }
            .showcase { padding: 24px 20px 32px; gap: 14px; }
            .showcase-images {
                width: calc(100vw - 40px);
                height: min(calc((100vw - 40px) * 0.625), 260px);
            }
            .filter-bar { padding: 28px 16px 0; gap: 0; }
            .projects { padding: 24px 16px 48px; }
            .projects-grid { grid-template-columns: 1fr; }
            .dynamic-island { padding: 10px 16px; }
            .island-center img { height: 32px; }
            .menu-toggle span { width: 20px; }
            .menu-item { font-size: 12px; }
            .menu-container.open { max-width: 240px; }
            .menu-container { gap: 18px; }
            footer { padding: 32px 20px 28px; }
            .footer-content { gap: 20px; margin-bottom: 36px; }
            .footer-contact-info { gap: 20px; }
            .footer-bottom { gap: 12px; }
        }
    </style>
</head>
<body>

    <!-- ── HERO ─────────────────────────────────────────────────────────────── -->
    <section class="hero">

        <div class="logo-stage" id="logoStage">

            <!-- Inline SVG logo — arch 拆成 .arch-left / .arch-right 以便動畫 -->
            <div class="logo-wrap">
                <svg viewBox="0 0 877.55 426.35" xmlns="http://www.w3.org/2000/svg" aria-label="WU DESIGN STUDIO 伍設計事務所">

    /* ── Showcase 每張圖的資料（依 202511_showcase_I/II/III/IV 順序） ── */
    var SHOWCASE = [
        { catZh:'活動 / 識別', catEn:'Event / Identity', titleZh:'台灣國際滑輪溜冰公開賽', titleEn:'Taiwan International Roller Skating Open' },
        { catZh:'識別',        catEn:'Identity',          titleZh:'宋俊宏婦幼醫院',         titleEn:"Sung Women and Children's Hospital"       },
        { catZh:'包裝',        catEn:'Packaging',         titleZh:'制菸所',                  titleEn:'No Smoking'                               },
        { catZh:'識別',        catEn:'Identity',          titleZh:'伍設計事務所',             titleEn:'WU DESIGN STUDIO'                         }
    ];

    /* ── 輪播 ── */
    var slides  = document.querySelectorAll('.showcase-img');
    var dots    = [];
    var current = 0;

    var scCatZh   = document.querySelector('.sc-cat-zh');
    var scCatEn   = document.querySelector('.sc-cat-en');
    var scTitleZh = document.querySelector('.sc-title-zh');
    var scTitleEn = document.querySelector('.sc-title-en');

    function updateShowcaseInfo(idx, animate) {
        var s = SHOWCASE[idx];
        if (!s) return;
        var hasCn = !!s.titleZh;
        if (scTitleEn) scTitleEn.classList.toggle('is-primary', !hasCn);
        if (animate) {
            if (scCatZh) scrambleText(scCatZh, s.catZh, true);
            if (scCatEn) scrambleText(scCatEn, s.catEn, false);
            if (scTitleZh) {
                scTitleZh.style.display = hasCn ? '' : 'none';
                if (hasCn) scrambleText(scTitleZh, s.titleZh, true);
                else scTitleZh.textContent = '';
            }
            if (scTitleEn) scrambleText(scTitleEn, s.titleEn, false);
        } else {
            if (scCatZh)   scCatZh.textContent  = s.catZh;
            if (scCatEn)   scCatEn.textContent   = s.catEn;
            if (scTitleZh) { scTitleZh.textContent = hasCn ? s.titleZh : ''; scTitleZh.style.display = hasCn ? '' : 'none'; }
            if (scTitleEn) scTitleEn.textContent = s.titleEn;
        }
    }

    var INTERVAL    = 3600;
    var paused      = false;
    var autoTimer   = null;
    var progressRaf = null;
    var slideStart  = 0;

    var ICON_PAUSE = '<svg viewBox="0 0 8 10" xmlns="http://www.w3.org/2000/svg" width="8" height="10"><rect x="0" y="0" width="2.5" height="10" rx="1"/><rect x="5.5" y="0" width="2.5" height="10" rx="1"/></svg>';
    var ICON_PLAY  = '<svg viewBox="0 0 8 10" xmlns="http://www.w3.org/2000/svg" width="8" height="10"><path d="M0 0l8 5-8 5z"/></svg>';

    (function buildDots() {
        var container = document.getElementById('showcaseDots');
        slides.forEach(function(_, i) {
            var d   = document.createElement('span');
            d.className = 'showcase-dot' + (i === 0 ? ' active' : '');
            var bar = document.createElement('span');
            bar.className = 'dot-progress';
            d.appendChild(bar);
            d.addEventListener('click', function() { goTo(i); });
            container.appendChild(d);
            dots.push(d);
        });
    })();

    updateShowcaseInfo(0, false);

    function startProgress() {
        cancelAnimationFrame(progressRaf);
        var bar = dots[current] && dots[current].querySelector('.dot-progress');
        if (!bar) return;
        bar.style.width = '0%';
        slideStart = performance.now();
        (function frame(now) {
            var pct = Math.min((now - slideStart) / INTERVAL * 100, 100);
            bar.style.width = pct + '%';
            if (!paused && pct < 100) progressRaf = requestAnimationFrame(frame);
        })(performance.now());
    }

    function scheduleNext() {
        clearTimeout(autoTimer);
        if (!paused) autoTimer = setTimeout(function() { goTo(current + 1); }, INTERVAL);
    }

    function goTo(n) {
        clearTimeout(autoTimer);
        cancelAnimationFrame(progressRaf);
        slides[current].classList.remove('active');
        dots[current].classList.remove('active');
        var oldBar = dots[current].querySelector('.dot-progress');
        if (oldBar) oldBar.style.width = '0%';
        current = (n + slides.length) % slides.length;
        slides[current].classList.add('active');
        dots[current].classList.add('active');
        updateShowcaseInfo(current, true);
        if (!paused) { startProgress(); scheduleNext(); }
    }

    function togglePause() {
        paused = !paused;
        var btn = document.getElementById('pauseBtn');
        if (paused) {
            clearTimeout(autoTimer);
            cancelAnimationFrame(progressRaf);
            if (btn) btn.innerHTML = ICON_PLAY;
        } else {
            startProgress();
            scheduleNext();
            if (btn) btn.innerHTML = ICON_PAUSE;
        }
    }

    var pauseBtn = document.getElementById('pauseBtn');
    if (pauseBtn) pauseBtn.addEventListener('click', togglePause);

    startProgress();
    scheduleNext();

    /* logo-stage 展開時觸發 scramble（桌機 hover） */
    var logoStage = document.getElementById('logoStage');
    if (logoStage) {
        logoStage.addEventListener('mouseenter', function() {
            updateShowcaseInfo(current, true);
        });
    }

    /* 手機：捲動到頂部時展開 hero（等同 hover 互動） */
    if (window.matchMedia('(max-width: 968px)').matches && logoStage) {
        var heroRevealed = false;
        function checkHeroReveal() {
            var atTop = window.scrollY < window.innerHeight * 0.5;
            if (atTop === heroRevealed) return;
            heroRevealed = atTop;
            if (atTop) {
                logoStage.classList.add('is-top');
                setTimeout(function() { updateShowcaseInfo(current, true); }, 150);
            } else {
                logoStage.classList.remove('is-top');
            }
        }
        window.addEventListener('scroll', checkHeroReveal, { passive: true });
        /* 初始狀態：頁面一載入即展開 */
        if (window.scrollY < window.innerHeight * 0.5) {
            heroRevealed = true;
            logoStage.classList.add('is-top');
            setTimeout(function() { updateShowcaseInfo(current, true); }, 400);
        }
    }

    /* ── 亂碼打字效果 ── */
    var CHARS_ZH = '一七八十丁戊己甲乙丙!@#%&*?';
    var CHARS_EN = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz!@#%&*?';

    function scrambleText(el, finalText, isZh) {
        var chars = isZh ? CHARS_ZH : CHARS_EN;
        if (el._scrambleRaf) cancelAnimationFrame(el._scrambleRaf);
        var iter = 0;
        function tick() {
            el.textContent = finalText.split('').map(function(ch, i) {
                if (ch === ' ' || ch === '/' || ch === '·' || ch === '&') return ch;
                if (i < Math.floor(iter / 2)) return ch;
                return chars[Math.floor(Math.random() * chars.length)];
            }).join('');
            iter++;
            if (Math.floor(iter / 2) < finalText.length) {
                el._scrambleRaf = requestAnimationFrame(tick);
            } else {
                el.textContent = finalText;
                el._scrambleRaf = null;
            }
        }
        tick();
    }

    function attachScramble() {
        document.querySelectorAll('.project-item').forEach(function(item) {
            var catZh = item.querySelector('.project-cat-zh');
            var catEn = item.querySelector('.project-cat-en');
            if (!catZh || !catEn) return;
            var zhText = catZh.textContent;
            var enText = catEn.textContent;
            item.addEventListener('mouseenter', function() {
                scrambleText(catZh, zhText, true);
                scrambleText(catEn, enText, false);
            });
        });
    }

    /* ── 渲染作品格 ── */
    function renderProjects(filter) {
        var grid = document.getElementById('projectsGrid');
        var count = 0;
        grid.innerHTML = '';
        PROJECTS.forEach(function(p) {
            if (filter !== 'all' && p.categories.indexOf(filter) === -1) return;
            count++;
            var mediaEl = p.thumb.type === 'video'
                ? '<video src="' + p.thumb.src + '" autoplay loop muted playsinline></video>'
                : '<img src="' + p.thumb.src + '" alt="' + p.titleEn + '" loading="lazy">';
            var titleHtml = p.titleZh
                ? '<div class="project-title-zh">' + p.titleZh + '</div>' +
                  '<div class="project-title-en">' + p.titleEn + '</div>'
                : '<div class="project-title-en is-primary">' + p.titleEn + '</div>';
            var el = document.createElement('a');
            el.href = p.href;
            el.className = 'project-item';
            el.setAttribute('data-zh', p.descZh);
            el.setAttribute('data-en', p.descEn);
            el.innerHTML =
                '<div class="project-image">' +
                    mediaEl +
                    '<div class="project-overlay">' +
                        '<span class="project-cat-zh">' + p.labelZh + '</span>' +
                        '<span class="project-cat-en">' + p.label + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="project-info">' + titleHtml + '</div>';
            grid.appendChild(el);
        });
        document.getElementById('filterCount').textContent = '(' + count + ' works)';
        attachObserver();
        attachHoverText();
        attachScramble();
    }

    document.getElementById('filterBar').addEventListener('click', function(e) {
        var btn = e.target.closest('.filter-btn');
        if (!btn) return;
        document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
        btn.classList.add('active');
        renderProjects(btn.getAttribute('data-filter'));
    });

    function attachObserver() {
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) { entry.target.classList.add('in-view'); observer.unobserve(entry.target); }
            });
        }, { threshold: 0.08 });
        document.querySelectorAll('.project-item').forEach(function(item) { observer.observe(item); });
    }

    var DEFAULT_ZH = '伍設計事務所，位於台灣';
    var DEFAULT_EN = 'Wu Design Studio, Based in Taiwan';

    function attachHoverText() {
        var zh = document.querySelector('.island-right .zh');
        var en = document.querySelector('.island-right .en');
        if (!zh) return;
        function setIsland(z, e) {
            zh.classList.remove('fade-in'); zh.classList.add('fade-out');
            en.classList.remove('fade-in'); en.classList.add('fade-out');
            setTimeout(function() {
                zh.textContent = z; en.textContent = e;
                zh.classList.remove('fade-out'); zh.classList.add('fade-in');
                en.classList.remove('fade-out'); en.classList.add('fade-in');
            }, 250);
        }
        document.querySelectorAll('.project-item').forEach(function(el) {
            el.addEventListener('mouseenter', function() { setIsland(this.getAttribute('data-zh'), this.getAttribute('data-en')); });
            el.addEventListener('mouseleave', function() { setIsland(DEFAULT_ZH, DEFAULT_EN); });
        });
    }

    var rafId;
    function updateParallax() {
        var wh = window.innerHeight;
        document.querySelectorAll('.project-item').forEach(function(item) {
            var r = item.getBoundingClientRect();
            if (r.top < wh && r.bottom > 0 && !item.matches(':hover')) {
                var media = item.querySelector('.project-image img, .project-image video');
                if (media) media.style.transform = 'translateY(' + ((((wh - r.top) / (wh + r.height)) - 0.5) * 20) + 'px)';
            }
        });
    }
    window.addEventListener('scroll', function() {
        if (rafId) cancelAnimationFrame(rafId);
        rafId = requestAnimationFrame(updateParallax);
    }, { passive: true });
    window.addEventListener('resize', updateParallax);

    var menuToggle = document.getElementById('menuToggle');
    var menuContainer = document.getElementById('menuContainer');
    menuToggle.addEventListener('click', function() {
        menuToggle.classList.toggle('open');
        menuContainer.classList.toggle('open');
    });

    var lenis = new Lenis({
        duration: 1.2,
        easing: function(t) { return Math.min(1, 1.001 - Math.pow(2, -10 * t)); },
        smoothWheel: true, smoothTouch: false
    });
    (function raf(time) { lenis.raf(time); requestAnimationFrame(raf); })(0);

    var contactBtn = document.querySelector('.js-contact-scroll');
    if (contactBtn) {
        contactBtn.addEventListener('click', function(e) {
            e.preventDefault();
            lenis.scrollTo(document.body.scrollHeight, { duration: 1.4 });
        });
    }

    var islandZh = document.querySelector('.island-right .zh');
    var islandEn = document.querySelector('.island-right .en');
    if (islandZh) islandZh.classList.add('fade-in');
    if (islandEn) islandEn.classList.add('fade-in');
    renderProjects('all');
    updateParallax();
    </script>
</body>
</html>
