<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KB_ROCA（食）- Vdesign</title>
    <link rel="icon" type="image/png" href="../assets/favicon.ico.png">
    <link rel="apple-touch-icon" href="../assets/favicon.ico.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.20/dist/lenis.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            color: #333;
            background: #fff;
            overflow-x: hidden;
            padding-bottom: 180px;
        }
        .english { font-family: Arial, sans-serif; }

        .hero-image {
            width: 100%;
            height: 400px;
            overflow: hidden;
            position: relative;
            z-index: 6;
            opacity: 0;
            animation: fadeIn 1s ease 0.3s forwards;
        }
        .hero-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        @keyframes fadeIn { to { opacity: 1; } }

        .content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 80px 60px;
            position: relative;
            z-index: 6;
        }

        .project-title {
            font-size: 32px;
            font-weight: 400;
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease 0.5s forwards;
            max-width: 680px;
            margin-left: auto;
            margin-right: auto;
            text-align: center;
        }

        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .description {
            font-size: 16px;
            line-height: 2;
            color: #666;
            margin-bottom: 80px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.8s ease 0.7s forwards;
            max-width: 680px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }

        .gallery-section {
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(40px);
        }

        .gallery-section.in-view {
            animation: slideUp 0.8s ease forwards;
        }

        .single-image {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }

        .single-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: white;
            padding: 40px 60px 35px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 40px;
            z-index: 10;
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            box-shadow: 0 -8px 32px rgba(0,0,0,0.06);
            transform: translateY(100%);
            animation: slideUpIsland 0.8s ease 0.3s forwards;
        }

        @keyframes slideUpIsland { to { transform: translateY(0); } }

        .island-left {
            display: flex;
            gap: 30px;
            align-items: center;
            position: relative;
            z-index: 10;
        }

        .menu-toggle {
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            padding: 8px;
            z-index: 1001;
            position: relative;
            background: transparent;
            border: none;
            outline: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        .menu-toggle span {
            width: 28px;
            height: 3px;
            background: #ccc;
            border-radius: 2px;
            transition: all 0.3s;
            pointer-events: none;
        }

        .menu-toggle:hover span { background: #FF0000; }
        .menu-toggle.open span:nth-child(1) { transform: rotate(45deg) translate(6px, 6px); }
        .menu-toggle.open span:nth-child(2) { opacity: 0; }
        .menu-toggle.open span:nth-child(3) { transform: rotate(-45deg) translate(6px, -6px); }

        .menu-container {
            display: flex;
            gap: 30px;
            align-items: center;
            max-width: 0;
            overflow: hidden;
            opacity: 0;
            transition: all 0.4s;
        }

        .menu-container.open { max-width: 400px; opacity: 1; }

        .menu-item {
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            display: block;
        }

        .menu-item img {
            height: 28px;
            width: auto;
            filter: brightness(0) saturate(100%) invert(80%);
            transition: all 0.3s;
            display: block;
        }

        .menu-item:hover img { filter: brightness(0) saturate(100%) invert(18%) sepia(100%) saturate(7426%) hue-rotate(0deg); }
        .menu-item.active img { filter: brightness(0) saturate(100%) invert(20%); }

        .island-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
        }

        .island-center a { display: block; transition: opacity 0.3s; cursor: pointer; }
        .island-center a:hover { opacity: 0.7; }
        .island-center img { height: 60px; display: block; pointer-events: none; }

        .island-right {
            flex: 1;
            text-align: right;
            line-height: 1.6;
            position: relative;
        }

        .island-right .chinese {
            display: block;
            font-size: 15px;
            color: #333;
        }

        .island-right .english {
            display: block;
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }

        @media (max-width: 968px) {
            body { padding-bottom: 120px; }
            .content { padding: 60px 30px; }
            .project-title, .description { max-width: 100%; }
            .project-title { font-size: 28px; margin-bottom: 40px; }
            .description { font-size: 15px; margin-bottom: 60px; }
            .gallery-section { margin-bottom: 40px; }

            .dynamic-island {
                padding: 20px 25px;
                border-top-left-radius: 28px;
                border-top-right-radius: 28px;
                gap: 15px;
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            .island-left { order: 1; gap: 8px; flex: 0 0 auto; z-index: 100; }
            .menu-container { gap: 8px; }
            .menu-container.open { max-width: 220px; }
            .island-center { order: 2; position: relative; left: 0; transform: none; flex: 0 0 auto; margin-left: auto; z-index: 20; }
            .island-center img { height: 42px; }
            .island-right { display: none; }
            .menu-toggle { padding: 10px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; z-index: 101; }
            .menu-toggle span { width: 24px; }
            .menu-item img { height: 20px; width: auto; }
        }

        @media (max-width: 640px) {
            body { padding-bottom: 110px; }
            .hero-image { height: 250px; }
            .content { padding: 40px 20px; }
            .project-title { font-size: 24px; margin-bottom: 30px; }
            .description { font-size: 14px; line-height: 1.8; }
            .dynamic-island { padding: 18px 20px; border-top-left-radius: 24px; border-top-right-radius: 24px; }
            .island-left { gap: 6px; z-index: 100; }
            .menu-container { gap: 6px; }
            .menu-toggle { padding: 8px; min-width: 44px; min-height: 44px; display: flex; align-items: center; justify-content: center; z-index: 101; }
            .menu-container.open { max-width: 200px; }
            .menu-item img { height: 18px; width: auto; }
            .island-center img { height: 38px; }
        }
    </style>
</head>
<body>
    <div class="hero-image">
        <img src="../assets/KB_ROCA(食)/VDesign_work_X_0.webp" alt="KB_ROCA（食）">
    </div>

    <div class="content">
        <h1 class="project-title">KB_ROCA（食）</h1>

        <p class="description">
            端著空餐盤，告訴這些食物，與其在我冰冷的不銹鋼中，不如去那個橘而溫暖的桶子。嗯．．．除了挑食之外，吃飯速度又不快，入伍後用餐就變成我最痛苦的事，難吃卻還得先呼口號、踩腳步才能排隊進餐廳，如此睿智的事值得我靠北。以此海報悼念我那四個月的食慾。
        </p>

        <div class="gallery-section">
            <div class="single-image">
                <img src="../assets/KB_ROCA(食)/VDesign_work_X_1.webp" alt="KB_ROCA（食）Visual 1">
            </div>
        </div>

        <div class="gallery-section">
            <div class="single-image">
                <img src="../assets/KB_ROCA(食)/VDesign_work_X_2.webp" alt="KB_ROCA（食）Visual 2">
            </div>
        </div>
    </div>

    <div class="dynamic-island">
        <div class="island-left">
            <div class="menu-toggle" id="menuToggle">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div class="menu-container" id="menuContainer">
                <a href="https://vdesign5.github.io/home/" class="menu-item active">
                    <img src="../assets/project.webp" alt="project">
                </a>
                <a href="https://vdesign5.github.io/home/works/about" class="menu-item">
                    <img src="../assets/about.webp" alt="about">
                </a>
                <a href="https://vdesign5.github.io/home/#contact" class="menu-item">
                    <img src="../assets/contact.webp" alt="contact">
                </a>
            </div>
        </div>
        <div class="island-center">
            <a href="https://vdesign5.github.io/home/">
                <img src="../assets/logo.png" alt="Vdesign Logo">
            </a>
        </div>
        <div class="island-right">
            <span class="chinese">KB_ROCA（食）海報設計</span>
            <span class="english">KB_ROCA (Food) - Poster Design</span>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.20/dist/lenis.min.js"></script>
    <script>
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1,
            smoothTouch: false,
            touchMultiplier: 2,
            infinite: false,
        });

        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const menuToggle = document.getElementById('menuToggle');
        const menuContainer = document.getElementById('menuContainer');

        if (menuToggle) {
            menuToggle.addEventListener('click', (e) => {
                e.stopPropagation();
                menuToggle.classList.toggle('open');
                menuContainer.classList.toggle('open');
            });
            menuToggle.addEventListener('touchstart', (e) => {
                e.preventDefault();
                menuToggle.classList.toggle('open');
                menuContainer.classList.toggle('open');
            }, { passive: false });
        }

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('in-view');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.gallery-section').forEach(s => observer.observe(s));
    </script>
</body>
</html>
